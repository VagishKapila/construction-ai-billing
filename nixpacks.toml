# Tell Railway's nixpacks to include BOTH Node.js and Python runtimes.
# Without this, Railway only activates the Node provider and python3 is
# not available when server.js tries to spawn parse_sov.py.
providers = ["node", "python"]

# vips (libvips) is required by the optional 'sharp' npm package for server-side
# image compression. If sharp fails to install, the app continues normally
# (graceful fallback — invoices are never affected).
[phases.setup]
nixPkgs = ["vips"]
