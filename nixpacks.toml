# Tell Railway's nixpacks to include BOTH Node.js and Python runtimes.
# Without this, Railway only activates the Node provider and python3 is
# not available when server.js tries to spawn parse_sov.py.
providers = ["node", "python"]

# Vite 8 + Rolldown require Node >= 22.12
# nodejs_22 gives us the latest 22.x LTS from nixpkgs.
#
# libvips-dev is required by the optional 'sharp' npm package for server-side
# image compression. Using aptPkgs (not nixPkgs) to avoid nix-collect-garbage
# removing Node.js after our derivation runs. If sharp fails to install,
# the app continues normally (graceful fallback — invoices are never affected).
#
# Chromium system libraries are required by Puppeteer for pixel-perfect PDF
# generation. Without these, puppeteer.launch() fails with missing .so errors
# (e.g. libbdbus-1.so.3). These are the minimal deps for headless Chrome.
[phases.setup]
nixPkgs = ["nodejs_22"]
aptPkgs = [
  "libvips-dev",
  "libnss3", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libdbus-1-3", "libxkbcommon0", "libxcomposite1",
  "libxdamage1", "libxrandr2", "libgbm1", "libasound2t64",
  "libpango-1.0-0", "libcairo2", "libxfixes3", "libx11-xcb1"
]
