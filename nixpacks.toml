# Tell Railway's nixpacks to include BOTH Node.js and Python runtimes.
# Without this, Railway only activates the Node provider and python3 is
# not available when server.js tries to spawn parse_sov.py.
#
# NOTE: aptPkgs section intentionally removed (Apr 16, 2026).
# Puppeteer was removed from dependencies, so nixpacks no longer
# auto-detects Chromium system libraries. We let nixpacks auto-detect
# what it needs — with puppeteer gone, that list is now empty.
# sharp (image compression) is in optionalDependencies and will fail
# gracefully without libvips-dev — client-side compression is the fallback.
providers = ["node", "python"]
