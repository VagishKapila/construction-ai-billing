<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Hub UI Flow — ConstructInvoice AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f4f5f8; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0d3db; border-radius: 99px; }
  textarea, input, select, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {

  bg:"#f4f5f8",card:"#ffffff",border:"#e2e5ec",borderLight:"#eef0f5",
  text:"#1A2230",textSub:"#5a6370",textMuted:"#9aa1ad",
  success:"#059669",successBg:"#ecfdf5",warning:"#d97706",warningBg:"#fffbeb",
  danger:"#dc2626",dangerBg:"#fef2f2",info:"#0891b2",infoBg:"#f0f9ff",

const PROJECTS = [
  { id:1,name:"123 Elm Street Addition",client:"ABC Properties",contract:284000,billed:176080,status:"active",phase:"Framing / MEP Rough-In",trades:5,pendingDocs:3,overdueDocs:1,payApp:"#4 submitted Apr 1",lastActivity:"2h ago" },
  { id:2,name:"Downtown Office Remodel",client:"Pinnacle Commercial LLC",contract:580000,billed:312400,status:"active",phase:"Drywall / Finish",trades:7,pendingDocs:1,overdueDocs:0,payApp:"#6 paid Mar 28",lastActivity:"1d ago" },
  { id:3,name:"Oak St Kitchen Renovation",client:"Elm Street LLC",contract:85000,billed:85000,status:"completed",phase:"Job Complete",trades:4,pendingDocs:0,overdueDocs:0,payApp:"Final paid",lastActivity:"2w ago" },
];

const TRADES = [
  { id:1,projId:1,name:"Plumbing",sub:"Pacific Coast Plumbing",email:"mike@pacificplumbing.com",alias:"plumbing-123elm@hub.constructinv.com",status:"active",docs:8,pending:2,overdue:1 },
  { id:2,projId:1,name:"Electrical",sub:"Bright Spark Electric",email:"office@brightspark.com",alias:"electrical-123elm@hub.constructinv.com",status:"active",docs:5,pending:1,overdue:0 },
  { id:3,projId:1,name:"HVAC",sub:"AirPro Systems",email:"admin@airpro.com",alias:"hvac-123elm@hub.constructinv.com",status:"active",docs:3,pending:0,overdue:0 },
  { id:4,projId:1,name:"Framing",sub:"SoCal Framing LLC",email:"jobs@socalframing.com",alias:"framing-123elm@hub.constructinv.com",status:"active",docs:12,pending:0,overdue:0 },
  { id:5,projId:1,name:"Drywall",sub:"(Invite pending)",email:null,alias:"drywall-123elm@hub.constructinv.com",status:"invited",docs:0,pending:0,overdue:0 },
];

const DOCS_INIT = [
  { id:1,tradeId:1,tradeName:"Plumbing",type:"invoice",filename:"Invoice_#2340_Rough-In.pdf",amount:"$18,400",status:"pending",stale:true,staleDays:3,uploadedBy:"Pacific Coast Plumbing",uploadedAt:"Apr 3, 2026",source:"email",sovLine:"Plumbing",sovBudget:42000,sovUsed:31200,notes:"Rough-in complete. Final invoice after trim-out.",versions:[{v:1,file:"Invoice_#2340_Rough-In.pdf",date:"Apr 3, 2026",status:"pending"}] },
  { id:2,tradeId:1,tradeName:"Plumbing",type:"lien_waiver",filename:"ConditionalWaiver_PA1.pdf",amount:"$12,800",status:"approved",stale:false,staleDays:0,uploadedBy:"Pacific Coast Plumbing",uploadedAt:"Mar 28, 2026",source:"magic_link",sovLine:"Plumbing",sovBudget:42000,sovUsed:31200,notes:"",versions:[{v:1,file:"ConditionalWaiver_PA1_v1.pdf",date:"Mar 25, 2026",status:"rejected"},{v:2,file:"ConditionalWaiver_PA1.pdf",date:"Mar 28, 2026",status:"approved"}] },
  { id:3,tradeId:1,tradeName:"Plumbing",type:"rfi",filename:"RFI-007_WaterHeater_Location.pdf",amount:null,status:"pending",stale:false,staleDays:1,uploadedBy:"Pacific Coast Plumbing",uploadedAt:"Apr 4, 2026",source:"magic_link",sovLine:null,sovBudget:null,sovUsed:null,notes:"Need clarification on water heater placement per updated drawing A-103.",versions:[{v:1,file:"RFI-007_WaterHeater_Location.pdf",date:"Apr 4, 2026",status:"pending"}] },
  { id:4,tradeId:2,tradeName:"Electrical",type:"invoice",filename:"Invoice_Electrical_Rough.pdf",amount:"$22,150",status:"pending",stale:false,staleDays:1,uploadedBy:"Bright Spark Electric",uploadedAt:"Apr 4, 2026",source:"web_app",sovLine:"Electrical",sovBudget:55000,sovUsed:22150,notes:"",versions:[{v:1,file:"Invoice_Electrical_Rough.pdf",date:"Apr 4, 2026",status:"pending"}] },
  { id:5,tradeId:2,tradeName:"Electrical",type:"photo",filename:"Panel_Inspection_Photos.zip",amount:null,status:"approved",stale:false,staleDays:0,uploadedBy:"Bright Spark Electric",uploadedAt:"Apr 2, 2026",source:"web_app",sovLine:null,sovBudget:null,sovUsed:null,notes:"",versions:[{v:1,file:"Panel_Inspection_Photos.zip",date:"Apr 2, 2026",status:"approved"}] },
  { id:6,tradeId:3,tradeName:"HVAC",type:"submittal",filename:"AirHandler_Submittal_Trane.pdf",amount:null,status:"approved",stale:false,staleDays:0,uploadedBy:"AirPro Systems",uploadedAt:"Mar 25, 2026",source:"email",sovLine:null,sovBudget:null,sovUsed:null,notes:"",versions:[{v:1,file:"AirHandler_Submittal_Trane.pdf",date:"Mar 25, 2026",status:"approved"}] },
  { id:7,tradeId:4,tradeName:"Framing",type:"daily_report",filename:"DailyReport_Apr4.pdf",amount:null,status:"approved",stale:false,staleDays:0,uploadedBy:"SoCal Framing LLC",uploadedAt:"Apr 4, 2026",source:"magic_link",sovLine:null,sovBudget:null,sovUsed:null,notes:"",versions:[{v:1,file:"DailyReport_Apr4.pdf",date:"Apr 4, 2026",status:"approved"}] },
  { id:8,tradeId:1,tradeName:"Plumbing",type:"change_order",filename:"CO-003_AddSump_Pump.pdf",amount:"$2,800",status:"pending",stale:true,staleDays:5,uploadedBy:"Pacific Coast Plumbing",uploadedAt:"Mar 30, 2026",source:"email",sovLine:null,sovBudget:null,sovUsed:null,notes:"Owner requested sump pump addition per site conditions.",versions:[{v:1,file:"CO-003_AddSump_Pump.pdf",date:"Mar 30, 2026",status:"pending"}] },
];

const DOC_META = {
  invoice:      {label:"Invoice",       color:C.purple,  bg:C.purpleBg,  icon:"💰"},
  lien_waiver:  {label:"Lien Waiver",   color:C.success, bg:C.successBg, icon:"📋"},
  rfi:          {label:"RFI",           color:C.warning, bg:C.warningBg, icon:"❓"},
  photo:        {label:"Photo/Video",   color:C.info,    bg:C.infoBg,    icon:"📷"},
  submittal:    {label:"Submittal",     color:"#7c3aed", bg:"#f5f3ff",   icon:"📁"},
  daily_report: {label:"Daily Report",  color:"#0891b2", bg:"#f0f9ff",   icon:"📅"},
  change_order: {label:"Change Order",  color:C.orange,  bg:"#fff7f5",   icon:"🔄"},
  compliance:   {label:"Compliance",    color:C.success, bg:C.successBg, icon:"✅"},
  drawing:      {label:"Drawing",       color:C.navy,    bg:"#f0f2f8",   icon:"📐"},
  other:        {label:"Other",         color:C.textSub, bg:"#f5f5f5",   icon:"📎"},
};

const Badge = ({type,size="sm"}) => {
  const m=DOC_META[type]||DOC_META.other;
  return <span style={{background:m.bg,color:m.color,border:`1px solid ${m.color}30`,borderRadius:99,padding:size==="sm"?"3px 9px":"5px 12px",fontSize:size==="sm"?11:12,fontWeight:600,whiteSpace:"nowrap"}}>{m.icon} {m.label}</span>;
};

const StatusBadge = ({status}) => {
  const cfg={pending:{bg:C.warningBg,color:C.warning,label:"Pending Review"},approved:{bg:C.successBg,color:C.success,label:"✓ Approved"},rejected:{bg:C.dangerBg,color:C.danger,label:"✗ Rejected"},active:{bg:C.successBg,color:C.success,label:"Active"},invited:{bg:C.infoBg,color:C.info,label:"Invited"},completed:{bg:"#f0f2f8",color:C.navy,label:"Completed"}}[status]||{bg:"#f5f5f5",color:C.textMuted,label:status};
  return <span style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.color}30`,borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{cfg.label}</span>;
};

const SourceBadge = ({source}) => {
  const cfg={web_app:{label:"Web Upload",icon:"🌐"},magic_link:{label:"Magic Link",icon:"🔗"},email_ingest:{label:"Email",icon:"📧"}}[source]||{label:source,icon:"📎"};
  return <span style={{fontSize:11,color:C.textMuted,background:"#f5f6f8",borderRadius:6,padding:"2px 7px"}}>{cfg.icon} {cfg.label}</span>;
};

const Card = ({children,style={},onClick}) => (
  <div onClick={onClick} style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"20px 24px",boxShadow:"0 2px 12px rgba(26,34,48,0.05)",transition:"all 0.15s",cursor:onClick?"pointer":"default",...style}}
    onMouseEnter={onClick?e=>{e.currentTarget.style.boxShadow="0 6px 24px rgba(26,34,48,0.12)";e.currentTarget.style.transform="translateY(-1px)";}:undefined}
    onMouseLeave={onClick?e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(26,34,48,0.05)";e.currentTarget.style.transform="translateY(0)";}:undefined}>
    {children}
  </div>
);

const Btn = ({children,variant="primary",onClick,size="md",disabled=false,style={}}) => {
  const s={primary:{bg:C.orange,color:"#fff",border:"none"},secondary:{bg:"transparent",color:C.navy,border:`1.5px solid ${C.border}`},ghost:{bg:"transparent",color:C.textSub,border:"none"},danger:{bg:C.dangerBg,color:C.danger,border:`1px solid ${C.danger}30`},success:{bg:C.successBg,color:C.success,border:`1px solid ${C.success}30`}}[variant];
  const pad={sm:"5px 12px",md:"8px 18px",lg:"11px 24px"}[size];
  return <button onClick={onClick} disabled={disabled} style={{background:s.bg,color:s.color,border:s.border,borderRadius:8,padding:pad,fontSize:size==="lg"?14:size==="sm"?12:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:6,...style}}>{children}</button>;
};

const Divider = () => <div style={{height:1,background:C.borderLight,margin:"14px 0"}} />;
const BackLink = ({label,onClick}) => <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,marginBottom:18,cursor:"pointer",color:C.textSub,fontSize:13,width:"fit-content"}}>← {label}</div>;

// SIDEBAR
const Sidebar = ({screen,setScreen,notifCount,currentProject}) => {
  const nav=[
    {id:"projects_list",icon:"🏗️",label:"All Projects"},
    {id:"hub_inbox",icon:"📥",label:"Project Hub",badge:notifCount,sub:currentProject?.name},
    {id:"hub_trades",icon:"🔧",label:"Trades",indent:true},
    {id:"hub_team",icon:"👥",label:"Team Roles",indent:true},
    {id:"ai_cashflow",icon:"🧠",label:"AI Cash Flow"},
    {id:"billing_integration",icon:"📄",label:"Billing (G702/G703)"},
    {id:"settings",icon:"⚙️",label:"Settings"},
  ];
  return (
    <div style={{width:220,minHeight:"100vh",background:C.navy,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"18px 20px 14px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{fontSize:12,fontWeight:700,color:C.orange,letterSpacing:0.5}}>CONSTRUCTINVOICE AI</div>
        {currentProject
          ? <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📌 {currentProject.name}</div>
          : <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>Select a project</div>
        }
      </div>
      <nav style={{flex:1,padding:"10px 10px"}}>
        {nav.map(item=>{
          if(item.indent&&!currentProject) return null;
          const active=screen===item.id;
          return (
            <div key={item.id} onClick={()=>setScreen(item.id)} style={{display:"flex",alignItems:"center",gap:10,padding:item.indent?"7px 10px 7px 28px":"9px 12px",borderRadius:8,cursor:"pointer",marginBottom:2,background:active?"rgba(232,98,42,0.15)":"transparent",borderLeft:active?`3px solid ${C.orange}`:"3px solid transparent",transition:"all 0.15s"}}>
              <span style={{fontSize:item.indent?13:15}}>{item.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:item.indent?12:13,fontWeight:active?600:400,color:active?"#fff":"rgba(255,255,255,0.6)"}}>{item.label}</div>
                {item.sub&&!item.indent&&<div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.sub}</div>}
              </div>
              {item.badge>0&&<span style={{background:C.orange,color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 6px"}}>{item.badge}</span>}
            </div>
          );
        })}
      </nav>
      <div style={{padding:"10px 10px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
        <div onClick={()=>setScreen("sub_magic_link")} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,cursor:"pointer",background:"rgba(255,255,255,0.05)"}}>
          <span style={{fontSize:13}}>🔗</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.45)"}}>Preview: Sub Portal</span>
        </div>
      </div>
    </div>
  );
};

// PROJECTS LIST
const ProjectsList = ({setScreen,setCurrentProject}) => {
  const handleSelect = proj => { setCurrentProject(proj); setScreen("hub_inbox"); };
  return (
    <div style={{padding:"28px 32px",flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:C.text}}>All Projects</div>
          <div style={{fontSize:13,color:C.textSub,marginTop:4}}>ABC General Contractors · 3 projects</div>
        </div>
        <Btn>+ New Project</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:28}}>
        {[{label:"Active Projects",value:"3",icon:"🏗️",color:C.navy},{label:"Pending Docs",value:"4",icon:"📥",color:C.warning},{label:"Overdue Docs",value:"1",icon:"🚨",color:C.danger},{label:"Total Outstanding",value:"$32,150",icon:"💰",color:C.orange}].map(k=>(
          <Card key={k.label} style={{padding:"18px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>{k.label}</div>
                <div style={{fontSize:26,fontWeight:800,color:k.color}}>{k.value}</div>
              </div>
              <span style={{fontSize:22}}>{k.icon}</span>
            </div>
          </Card>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {PROJECTS.map(p=>{
          const pct=Math.round((p.billed/p.contract)*100);
          return (
            <Card key={p.id} onClick={()=>handleSelect(p)} style={{padding:"0",overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:0}}>
                <div style={{padding:"20px 24px"}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
                    <div style={{fontSize:16,fontWeight:700,color:C.text}}>{p.name}</div>
                    <StatusBadge status={p.status} />
                    {p.pendingDocs>0&&<span style={{background:C.warningBg,color:C.warning,borderRadius:99,fontSize:11,fontWeight:700,padding:"2px 8px"}}>⚠️ {p.pendingDocs} docs need review</span>}
                    {p.overdueDocs>0&&<span style={{background:C.dangerBg,color:C.danger,borderRadius:99,fontSize:11,fontWeight:700,padding:"2px 8px"}}>🚨 {p.overdueDocs} overdue</span>}
                  </div>
                  <div style={{fontSize:12,color:C.textSub,marginBottom:12}}>{p.client} · {p.trades} trades · Phase: {p.phase} · Last activity: {p.lastActivity}</div>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
                      <span style={{color:C.textSub}}>Billed ${p.billed.toLocaleString()} of ${p.contract.toLocaleString()}</span>
                      <span style={{fontWeight:700,color:C.orange}}>{pct}%</span>
                    </div>
                    <div style={{height:7,background:"#eef0f5",borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",background:`linear-gradient(90deg, ${C.orange}, #f5945c)`,width:`${pct}%`,borderRadius:99}} />
                    </div>
                  </div>
                </div>
                <div style={{background:"#f8f9fb",borderLeft:`1.5px solid ${C.border}`,padding:"20px 24px",display:"flex",flexDirection:"column",justifyContent:"center",gap:12,minWidth:190}}>
                  <div>
                    <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.7,marginBottom:4}}>Latest Pay App</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{p.payApp}</div>
                  </div>
                  <div style={{height:1,background:C.border}} />
                  <Btn size="sm">Open Hub →</Btn>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
};

// HUB INBOX
const HubInbox = ({docs,setDocs,setScreen,setSelectedDoc,currentProject}) => {
  const [filter,setFilter]=useState("all");
  const [tradeFilter,setTradeFilter]=useState("all");
  const filtered=docs.filter(d=>(filter==="all"||d.status===filter)&&(tradeFilter==="all"||d.tradeId===parseInt(tradeFilter)));
  const staleDocs=docs.filter(d=>d.stale);
  return (
    <div style={{padding:"28px 32px",flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:C.text}}>📥 Project Hub</div>
          <div style={{fontSize:13,color:C.textSub,marginTop:3}}>{currentProject?.name} · All incoming documents from trades</div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="secondary" onClick={()=>setScreen("hub_trades")}>Manage Trades</Btn>
          <Btn onClick={()=>setScreen("hub_add_trade")}>+ Add Trade</Btn>
        </div>
      </div>
      <div style={{background:"linear-gradient(135deg,#f0f2f8,#e8eaf2)",border:`1.5px solid ${C.navy}15`,borderRadius:12,padding:"12px 18px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:18}}>📄</span>
          <div style={{fontSize:13,color:C.text}}><strong>Pay App #4 submitted Apr 1</strong> — $32,150 outstanding · <span style={{color:C.success}}>ABC Properties avg: 12 days</span></div>
        </div>
        <Btn size="sm" variant="secondary" onClick={()=>setScreen("billing_integration")}>View Billing →</Btn>
      </div>
      {staleDocs.map(d=>(
        <div key={d.id} style={{background:d.staleDays>=5?C.dangerBg:C.warningBg,border:`1.5px solid ${d.staleDays>=5?C.danger:C.warning}40`,borderRadius:12,padding:"11px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:18}}>{d.staleDays>=5?"🚨":"⚠️"}</span>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:d.staleDays>=5?C.danger:C.warning}}>{d.staleDays>=5?"URGENT":"Needs Review"} — {d.tradeName}: {d.filename}</div>
              <div style={{fontSize:12,color:C.textSub}}>Uploaded {d.uploadedAt} · Waiting {d.staleDays} day{d.staleDays!==1?"s":""}</div>
            </div>
          </div>
          <Btn size="sm" onClick={()=>{setSelectedDoc(d);setScreen("hub_doc_detail");}}>Review Now →</Btn>
        </div>
      ))}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:3,background:"#f0f2f8",borderRadius:8,padding:3}}>
          {["all","pending","approved","rejected"].map(f=>(
            <div key={f} onClick={()=>setFilter(f)} style={{padding:"5px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",background:filter===f?C.navy:"transparent",color:filter===f?"#fff":C.textSub,textTransform:"capitalize",transition:"all 0.15s"}}>
              {f} ({f==="all"?docs.length:docs.filter(d=>d.status===f).length})
            </div>
          ))}
        </div>
        <select value={tradeFilter} onChange={e=>setTradeFilter(e.target.value)} style={{border:`1.5px solid ${C.border}`,borderRadius:8,padding:"6px 12px",fontSize:12,color:C.text,background:C.card,outline:"none"}}>
          <option value="all">All Trades</option>
          {TRADES.filter(t=>t.status==="active").map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
      </div>
      <Card style={{padding:0,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:"#f8f9fb"}}>
              {["Trade","Document","Type","Amt","Ver.","Source","Status","Uploaded",""].map(h=>(
                <th key={h} style={{padding:"11px 14px",fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.8,textAlign:"left",borderBottom:`1.5px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((doc)=>(
              <tr key={doc.id} onClick={()=>{setSelectedDoc(doc);setScreen("hub_doc_detail");}} style={{borderBottom:`1px solid ${C.borderLight}`,cursor:"pointer",background:"#fff"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f0f2ff"}
                onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                <td style={{padding:"12px 14px",fontSize:13,fontWeight:600,color:C.text}}>{doc.tradeName}</td>
                <td style={{padding:"12px 14px",fontSize:12,color:C.text,maxWidth:180}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>

// DOC DETAIL — with reject flow + version history
const DocDetail = ({doc,docs,setDocs,setScreen}) => {
  const [status,setStatus]=useState(doc?.status||"pending");
  const [rejectStep,setRejectStep]=useState(0);
  const [rejectReason,setRejectReason]=useState("");
  const [comment,setComment]=useState("");
  const [rfiReply,setRfiReply]=useState("");
  const [comments,setComments]=useState([{author:"You",time:"2d ago",text:"Please confirm scope matches SOV line 4.",type:"comment"}]);
  if(!doc) return null;

  const approve=()=>{
    setStatus("approved");
    setComments(c=>[...c,{author:"You",time:"Just now",text:"✅ Document approved.",type:"approval"}]);
    setDocs(prev=>prev.map(d=>d.id===doc.id?{...d,status:"approved"}:d));
  };
  const submitReject=()=>{
    if(!rejectReason.trim()) return;
    setStatus("rejected"); setRejectStep(2);
    setComments(c=>[...c,{author:"You",time:"Just now",text:`❌ Rejected — ${rejectReason}\n\nSub notified. They can re-upload a revised version to this thread.`,type:"rejection"}]);
    setDocs(prev=>prev.map(d=>d.id===doc.id?{...d,status:"rejected"}:d));
  };
  const sendComment=()=>{if(!comment.trim())return;setComments(c=>[...c,{author:"You",time:"Just now",text:comment,type:"comment"}]);setComment("");};
  const sendRfi=()=>{if(!rfiReply.trim())return;setComments(c=>[...c,{author:"You",time:"Just now",text:`↩ RFI Reply: ${rfiReply}`,type:"rfi_reply"}]);setRfiReply("");};

  return (
    <div style={{padding:"28px 32px",flex:1,overflowY:"auto"}}>
      <BackLink label="Back to Inbox" onClick={()=>setScreen("hub_inbox")} />
      <div style={{display:"grid",gridTemplateColumns:"1fr 310px",gap:18}}>
        <div>
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div>
                <div style={{display:"flex",gap:7,marginBottom:8,flexWrap:"wrap"}}>
                  <Badge type={doc.type} size="md" /><StatusBadge status={status} /><SourceBadge source={doc.source} />
                  {doc.stale&&<span style={{background:doc.staleDays>=5?C.dangerBg:C.warningBg,color:doc.staleDays>=5?C.danger:C.warning,borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:700}}>⚠️ Stale {doc.staleDays}d</span>}
                </div>
                <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:3}}>{doc.filename}</div>
                <div style={{fontSize:13,color:C.textSub}}>From {doc.uploadedBy} · {doc.tradeName} · {doc.uploadedAt}</div>
              </div>
              {doc.amount&&<div style={{fontSize:24,fontWeight:800,color:C.orange}}>{doc.amount}</div>}
            </div>
            {doc.notes&&<div style={{background:"#f8f9fb",borderRadius:9,padding:"11px 14px",fontSize:13,color:C.text,borderLeft:`3px solid ${C.orange}`}}>{doc.notes}</div>}
            {doc.sovLine&&<>
              <Divider />
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>🧠 AI SOV Budget Check — {doc.sovLine}</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                    <span style={{color:C.textSub}}>Cumulative invoices</span>
                    <span style={{fontWeight:700}}>${doc.sovUsed.toLocaleString()} / ${doc.sovBudget.toLocaleString()}</span>
                  </div>
                  <div style={{height:8,background:"#e8eaf0",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",background:(doc.sovUsed/doc.sovBudget)>0.85?C.danger:C.orange,width:`${Math.min(100,(doc.sovUsed/doc.sovBudget)*100)}%`,borderRadius:99}} />
                  </div>
                  <div style={{fontSize:11,color:C.textSub,marginTop:4}}>{Math.round((doc.sovUsed/doc.sovBudget)*100)}% of budget used</div>
                </div>
                {(doc.sovUsed/doc.sovBudget)>0.75&&<span style={{background:C.warningBg,color:C.warning,borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>⚠️ Near Budget</span>}
              </div>
            </>}
            <Divider />
            <div style={{background:"#f8f9fb",border:`1.5px dashed ${C.border}`,borderRadius:10,height:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:32}}>📄</span>
              <div style={{fontSize:13,fontWeight:600,color:C.textSub}}>{doc.filename}</div>
              <Btn size="sm" variant="secondary">⬇ Download</Btn>
            </div>
          </Card>

          {doc.type==="rfi"&&(
            <Card style={{marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:10}}>💬 Reply to RFI</div>
              <div style={{fontSize:13,color:C.textSub,background:"#f8f9fb",borderRadius:8,padding:"10px 12px",marginBottom:12,borderLeft:`3px solid ${C.warning}`}}>{doc.notes}</div>
              <textarea value={rfiReply} onChange={e=>setRfiReply(e.target.value)} placeholder="Type your reply... (sub will be notified)" style={{width:"100%",minHeight:70,border:`1.5px solid ${C.border}`,borderRadius:8,padding:"10px 12px",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box"}} />
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <Btn onClick={sendRfi}>📤 Send Reply to Sub</Btn>
                <Btn variant="secondary">📎 Attach File</Btn>
              </div>
            </Card>
          )}

          {rejectStep===1&&(
            <div style={{background:C.dangerBg,border:`1.5px solid ${C.danger}40`,borderRadius:12,padding:"18px 20px",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,color:C.danger,marginBottom:8}}>❌ Reject Document — Required: Add a Reason</div>
              <div style={{fontSize:13,color:C.textSub,marginBottom:12}}>The sub will receive an email with your reason and a direct link to re-upload a revised version to this same document thread.</div>
              <textarea value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="e.g. Amount doesn't match approved change order. Please revise and resubmit." style={{width:"100%",minHeight:80,border:`1.5px solid ${C.danger}60`,borderRadius:8,padding:"10px 12px",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box",background:"#fff"}} autoFocus />
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button onClick={submitReject} disabled={!rejectReason.trim()} style={{padding:"9px 18px",background:rejectReason.trim()?C.danger:"#e0e0e0",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:rejectReason.trim()?"pointer":"not-allowed"}}>
                  Send Rejection + Notify Sub
                </button>
                <Btn variant="ghost" onClick={()=>setRejectStep(0)}>Cancel</Btn>
              </div>
            </div>
          )}

          {rejectStep===2&&(
            <Card style={{background:C.dangerBg,border:`1.5px solid ${C.danger}30`,marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.danger,marginBottom:6}}>❌ Rejected — Sub Notified</div>
              <div style={{fontSize:13,color:C.textSub}}>{doc.uploadedBy} received your reason and a re-upload link. When they re-upload, this doc returns to Pending as v{doc.versions.length+1}. The version counter stays accurate.</div>
            </Card>
          )}

          <Card style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>📋 Version History ({doc.versions.length} version{doc.versions.length>1?"s":""})</div>
            {doc.versions.map(v=>(
              <div key={v.v} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.borderLight}`}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{background:v.status==="approved"?C.successBg:v.status==="rejected"?C.dangerBg:C.warningBg,color:v.status==="approved"?C.success:v.status==="rejected"?C.danger:C.warning,borderRadius:99,fontSize:11,fontWeight:700,padding:"2px 8px"}}>v{v.v}</span>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:C.text}}>{v.file}</div>
                    <div style={{fontSize:11,color:C.textMuted}}>{v.date}</div>
                  </div>
                </div>
                <StatusBadge status={v.status} />
              </div>
            ))}
            {status==="rejected"&&<div style={{marginTop:10,fontSize:12,color:C.info,background:C.infoBg,borderRadius:7,padding:"8px 12px"}}>🔗 Sub was sent a re-upload link. Next upload = v{doc.versions.length+1}</div>}
          </Card>

          <Card>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>Activity & Comments</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
              {comments.map((c,i)=>(
                <div key={i} style={{background:c.type==="approval"?C.successBg:c.type==="rejection"?C.dangerBg:c.type==="rfi_reply"?C.warningBg:"#f8f9fb",borderRadius:8,padding:"10px 13px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:3}}>{c.author} <span style={{fontWeight:400,color:C.textMuted}}>· {c.time}</span></div>
                  <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap"}}>{c.text}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={comment} onChange={e=>setComment(e.target.value)} placeholder="Add a comment..." onKeyDown={e=>e.key==="Enter"&&sendComment()} style={{flex:1,border:`1.5px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:13,outline:"none"}} />
              <Btn onClick={sendComment}>Send</Btn>
            </div>
          </Card>
        </div>

        <div>
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:14}}>Review Actions</div>
            {status==="pending"&&rejectStep===0?(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={approve} style={{width:"100%",padding:"13px",background:C.success,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>✅ Approve</button>
                <button onClick={()=>setRejectStep(1)} style={{width:"100%",padding:"13px",background:C.dangerBg,color:C.danger,border:`1.5px solid ${C.danger}30`,borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>❌ Reject & Request Revision</button>

              </div>
            ):status!=="pending"?(
              <div style={{textAlign:"center",padding:"12px 0"}}>
                <StatusBadge status={status} />
                <div style={{fontSize:12,color:C.textSub,marginTop:8}}>Reviewed just now</div>
              </div>
            ):null}
          </Card>
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Document Details</div>
            {[{label:"Trade",value:doc.tradeName},{label:"Sub",value:doc.uploadedBy},{label:"Via",value:doc.source==="magic_link"?"Magic Link":doc.source==="email"?"Email Ingest":"Web Upload"},{label:"Uploaded",value:doc.uploadedAt},{label:"Versions",value:`v${doc.versions.length}`},...(doc.amount?[{label:"Amount",value:doc.amount}]:[])].map(r=>(

                <span style={{fontWeight:600,color:C.text}}>{r.value}</span>
              </div>
            ))}
          </Card>
          <Card style={{background:"#f8f9fb"}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>🤖 AI Auto-Routing</div>
            {[{role:"Office / Accountant",routed:["invoice","lien_waiver","compliance"].includes(doc.type),icon:"🧾"},{role:"PM / PMCM",routed:["rfi","submittal","change_order","drawing"].includes(doc.type),icon:"📋"},{role:"Superintendent",routed:["daily_report","photo","other"].includes(doc.type),icon:"🦺"}].map(r=>(
              <div key={r.role} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.borderLight}`,fontSize:12}}>

                <span style={{flex:1,color:r.routed?C.text:C.textMuted}}>{r.role}</span>
                {r.routed&&<span style={{color:C.success,fontWeight:700}}>✓ Notified</span>}
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
};

// ROOT APP
function App() {
  const [screen,setScreen]=useState("projects_list");
  const [currentProject,setCurrentProject]=useState(null);
  const [selectedDoc,setSelectedDoc]=useState(null);
  const [docs,setDocs]=useState(DOCS_INIT);
  const notifCount=docs.filter(d=>d.stale).length;

  const renderScreen=()=>{
    switch(screen){
      case "projects_list":      return <ProjectsList setScreen={setScreen} setCurrentProject={setCurrentProject} />;
      case "hub_inbox":          return <HubInbox docs={docs} setDocs={setDocs} setScreen={setScreen} setSelectedDoc={setSelectedDoc} currentProject={currentProject} />;
      case "hub_doc_detail":     return <DocDetail doc={selectedDoc} docs={docs} setDocs={setDocs} setScreen={setScreen} />;
      case "hub_trades":         return <TradesView setScreen={setScreen} />;
      case "hub_add_trade":      return <AddTrade setScreen={setScreen} />;
      case "hub_team":           return <TeamRoles />;
      case "ai_cashflow":        return <AICashFlow />;
      case "billing_integration":return <BillingIntegration setScreen={setScreen} />;
      case "settings":           return <Settings />;
      default:                   return <ProjectsList setScreen={setScreen} setCurrentProject={setCurrentProject} />;
    }
  };

  if(screen==="sub_magic_link") return <div style={{fontFamily:"'Inter',system-ui"}}><SubMagicLink setScreen={setScreen} /></div>;

  return (
    <div style={{fontFamily:"'Inter',system-ui",display:"flex",height:"100vh",overflow:"hidden",background:C.bg}}>
      <Sidebar screen={screen} setScreen={setScreen} notifCount={notifCount} currentProject={currentProject} setCurrentProject={setCurrentProject} />
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{height:50,background:C.card,borderBottom:`1.5px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",flexShrink:0}}>
          <div style={{fontSize:12,color:C.textSub}}>
            <span style={{fontWeight:700,color:C.text}}>ConstructInvoice AI</span>
            {currentProject&&<> · <span style={{color:C.orange}}>{currentProject.name}</span></>}
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{position:"relative",cursor:"pointer"}}>
              <span style={{fontSize:18}}>🔔</span>
              {notifCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.danger,color:"#fff",borderRadius:"50%",fontSize:9,fontWeight:700,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center"}}>{notifCount}</span>}
            </div>
            <div style={{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${C.orange},${C.navy})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>V</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>{renderScreen()}</div>
      </div>
    </div>
  );
}
