<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Documents - ConstructInvoice AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #1a1a2e;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header {
      margin-bottom: 40px;
      text-align: center;
    }

    .logo {
      height: 48px;
      margin-bottom: 20px;
      display: inline-block;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .project-info {
      background: #f0f4f8;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(37, 99, 235, 0.08);
      margin-bottom: 24px;
    }

    .upload-zone {
      border: 2px dashed #e2e8f0;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #f8fafc;
    }

    .upload-zone:hover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .upload-zone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: inset 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .upload-text {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .upload-hint {
      font-size: 13px;
      color: #666;
    }

    #file-input {
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    select,
    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      color: #1a1a2e;
      transition: all 0.2s ease;
    }

    select:focus,
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .button {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-block;
      text-align: center;
    }

    .button-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      width: 100%;
    }

    .button-primary:hover {
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .button-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .file-list {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: #f8fafc;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .file-icon {
      width: 32px;
      height: 32px;
      background: #e0e7ff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563eb;
      font-size: 16px;
      flex-shrink: 0;
    }

    .file-name {
      flex: 1;
      color: #1a1a2e;
      font-weight: 500;
    }

    .file-size {
      color: #888;
      font-size: 12px;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(37, 99, 235, 0.2);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px;
      }

      h1 {
        font-size: 24px;
      }

      .card {
        padding: 24px;
      }

      .upload-zone {
        padding: 32px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/varshyl-logo.png" alt="ConstructInvoice AI" class="logo">
      <h1>Upload Documents</h1>
      <p class="subtitle">Submit your invoice or document to the project</p>
    </div>

    <div id="error-message" class="error" style="display: none;"></div>
    <div id="success-message" class="success" style="display: none;"></div>

    <div id="project-info" class="project-info" style="display: none;">
      <span id="project-address"></span>
    </div>

    <div class="card">
      <form id="upload-form">
        <div class="form-group">
          <label for="doc-type">Document Type *</label>
          <select id="doc-type" required>
            <option value="">Select a type...</option>
            <option value="invoice">Invoice</option>
            <option value="lien_waiver">Lien Waiver</option>
            <option value="rfi">RFI (Request for Information)</option>
            <option value="photo">Photo</option>
            <option value="submittal">Submittal</option>
            <option value="daily_report">Daily Report</option>
            <option value="change_order">Change Order</option>
            <option value="compliance">Compliance Document</option>
            <option value="drawing">Drawing</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="doc-amount">Amount (if applicable)</label>
          <input type="text" id="doc-amount" placeholder="$0.00" pattern="^\$?[0-9]{1,3}(,[0-9]{3})*(\.[0-9]{2})?$">
        </div>

        <div class="form-group">
          <label>Upload File *</label>
          <div class="upload-zone" id="upload-zone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Click or drag files here</div>
            <div class="upload-hint">PDF, Excel, Word, or image files (max 10MB)</div>
            <input type="file" id="file-input" accept=".pdf,.xlsx,.xls,.docx,.doc,.jpg,.jpeg,.png,.gif" onchange="handleFileSelect(event)">
          </div>
          <div id="file-list" class="file-list" style="display: none;"></div>
        </div>

        <div class="form-group">
          <label for="doc-notes">Notes</label>
          <textarea id="doc-notes" placeholder="Add any notes about this document..."></textarea>
        </div>

        <button type="submit" class="button button-primary">
          <span id="submit-text">Upload Document</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    let selectedFile = null;
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const form = document.getElementById('upload-form');

    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      showError('Invalid magic link. Please check the URL and try again.');
    }

    uploadZone.addEventListener('click', () => fileInput.click());

    function handleDragOver(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.add('dragover');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('dragover');
    }

    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        fileInput.files = files;
        handleFileSelect({ target: { files } });
      }
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 10 * 1024 * 1024) {
        showError('File is too large (max 10MB)');
        return;
      }

      selectedFile = file;
      displayFile(file);
    }

    function displayFile(file) {
      const fileList = document.getElementById('file-list');
      const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
      fileList.innerHTML = `
        <div class="file-item">
          <div class="file-icon">📎</div>
          <div class="file-name">${file.name}</div>
          <div class="file-size">${sizeInMB}MB</div>
        </div>
      `;
      fileList.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!selectedFile) {
        showError('Please select a file to upload');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      const submitText = document.getElementById('submit-text');
      const originalText = submitText.textContent;

      submitBtn.disabled = true;
      submitText.innerHTML = '<span class="spinner"></span> Uploading...';

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('doc_type', document.getElementById('doc-type').value);
      formData.append('amount', document.getElementById('doc-amount').value);
      formData.append('notes', document.getElementById('doc-notes').value);

      try {
        const response = await fetch(`/api/hub/${token}/upload`, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const error = await response.text();
          throw new Error(error || 'Upload failed');
        }

        const result = await response.json();
        showSuccess('Document uploaded successfully!');

        setTimeout(() => {
          form.reset();
          selectedFile = null;
          document.getElementById('file-list').style.display = 'none';
          submitBtn.disabled = false;
          submitText.textContent = originalText;
        }, 2000);
      } catch (err) {
        showError(`Upload failed: ${err.message}`);
        submitBtn.disabled = false;
        submitText.textContent = originalText;
      }
    });

    function showError(msg) {
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      document.getElementById('success-message').style.display = 'none';
    }

    function showSuccess(msg) {
      const successEl = document.getElementById('success-message');
      successEl.textContent = msg;
      successEl.style.display = 'block';
      document.getElementById('error-message').style.display = 'none';
    }
  </script>
</body>
</html>
