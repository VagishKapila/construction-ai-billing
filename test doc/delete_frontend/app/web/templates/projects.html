<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Projects</h1>
        <a href="/" class="text-indigo-600">← Dashboard</a>
    </div>

    <div class="bg-white p-4 rounded shadow mb-6">
        <h2 class="font-semibold mb-2">Create New Project</h2>
        <input id="jobNumber" placeholder="Job Number"
               class="border p-2 mr-2 rounded">
        <input id="jobAddress" placeholder="Job Address"
               class="border p-2 mr-2 rounded w-96">
        <button id="createBtn"
                class="bg-indigo-600 text-white px-4 py-2 rounded">
            Create
        </button>
    </div>

    <div id="projectList" class="space-y-3"></div>

</div>

<script src="/static/projects.js"></script>
</body>
</html>
